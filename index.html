<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p {
            width: 100%;
            flex-direction: row;
            align-items: flex-start;
            justify-content: flex-start;
        }
        p {
            display: inline;
            word-spacing: 0.25rem;
        }
        h1 {
            margin-top: 1rem;
            font-size: 2rem;
            text-transform: capitalize;
            text-decoration: underline;
            text-decoration-style: wavy;
            text-decoration-color: blueviolet;
            text-decoration-thickness: 0.25rem;
            writing-mode: vertical-rl;
            text-orientation: sideways-right;
        }
    </style>
</head>
<body>
    <section>
        <h1> This is a Header </h1>
        <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Cumque quod quae, dolorum maiores, officiis veritatis voluptatibus consectetur vel tempora accusamus atque quasi ea totam! Dolorum harum provident recusandae earum minus!</p>
    </section>
</body>
</html>
